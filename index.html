<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MySoul — 12 Week Year</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lora:ital@1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1f2e;--s1:#252c40;--s2:#2d3450;--s3:#343d5c;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);--b3:rgba(255,255,255,.18);
  --t1:#dde4f8;--t2:#9aa4c8;--t3:#606880;
  --ac:#6c63ff;--ac2:#9b95ff;--hc:#2dd4a0;--gold:#f5c842;--red:#f87171;
  --deleg:#c4b5fd;--setup:#818cf8;--r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);background-image:radial-gradient(ellipse 70% 50% at 5% 0%,rgba(108,99,255,.13) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 95% 95%,rgba(45,212,160,.07) 0%,transparent 50%);color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.55;min-height:100vh;}
.wrap{max-width:1100px;margin:0 auto;padding:0 16px 80px;}

/* HEADER */
.hdr{padding:28px 0 22px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--b2);margin-bottom:24px;}
.eyebrow{font-family:'Lora',serif;font-style:italic;font-size:12px;color:var(--t3);letter-spacing:.12em;margin-bottom:3px;}
.title{font-size:26px;font-weight:700;letter-spacing:-.5px;}
.title em{font-style:normal;color:var(--ac2);}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.wpill{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;white-space:nowrap;}
.sbadge{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid;white-space:nowrap;transition:all .3s;}
.sbadge.ok{color:var(--hc);border-color:rgba(45,212,160,.3);background:rgba(45,212,160,.08);}
.sbadge.busy{color:var(--gold);border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.08);}
.sbadge.err{color:var(--red);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08);}
.sbadge.off{color:var(--t3);border-color:var(--b2);}

/* TIMELINE */
.tl-wrap{margin-bottom:22px;}
.tl-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.tl-bar{display:flex;gap:4px;}
.ts{flex:1;height:7px;border-radius:4px;background:var(--s3);cursor:pointer;transition:transform .1s;}
.ts:hover{transform:scaleY(1.5);}
.ts.past{background:linear-gradient(90deg,var(--ac),var(--ac2));opacity:.45;}
.ts.current{background:linear-gradient(90deg,var(--gold),#f5a623);box-shadow:0 0 10px rgba(245,200,66,.35);}
.ts.great{background:var(--hc);opacity:.8;}
.ts.viewing{outline:2px solid var(--gold);outline-offset:2px;}
.tl-nums{display:flex;gap:4px;margin-top:4px;}
.tl-nums span{flex:1;font-size:9px;color:var(--t3);text-align:center;}

/* WEEK NAV */
.wnav{display:flex;align-items:center;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.wnav-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);}
.wtabs{display:flex;gap:4px;flex-wrap:wrap;}
.wt{width:32px;height:32px;border-radius:var(--rs);border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;position:relative;}
.wt:hover{background:var(--s2);color:var(--t1);}
.wt.active{background:var(--ac);border-color:var(--ac);color:#fff;}
.wt.dot::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--hc);}
.wt.active.dot::after{background:rgba(255,255,255,.55);}
.cur-btn{background:transparent;border:1px solid var(--b2);color:var(--t2);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;padding:7px 14px;border-radius:var(--rs);cursor:pointer;transition:all .15s;white-space:nowrap;margin-left:auto;}
.cur-btn:hover{background:var(--s2);color:var(--t1);}

/* SCORES */
.ss{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:20px;}
@media(max-width:560px){.ss{grid-template-columns:1fr 1fr;}}
.sc{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:16px 18px;}
.sc.p{background:linear-gradient(135deg,var(--s2) 0%,rgba(27,32,52,.95) 100%);border-color:rgba(108,99,255,.28);}
.sc-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
.sc-val{font-size:30px;font-weight:700;line-height:1;letter-spacing:-1px;}
.sc-sub{font-size:11px;color:var(--t3);margin-top:3px;}
.pbar{background:var(--b2);border-radius:3px;height:4px;margin-top:10px;}
.pfill{height:4px;border-radius:3px;transition:width .45s ease;}

/* BREAKDOWN */
.bd{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px 18px;margin-bottom:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;}
.bd-lbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.bd-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.bd-track{background:var(--b2);border-radius:3px;height:5px;}
.bd-bar{height:5px;border-radius:3px;transition:width .4s ease;}
.bd-pct{font-size:11px;color:var(--t3);margin-top:4px;font-weight:500;}

/* ACTIONS */
.actions{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.btn{background:transparent;border:1px solid var(--b2);color:var(--t2);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;padding:7px 14px;border-radius:var(--rs);cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--s2);color:var(--t1);}
.btn.primary{background:var(--ac);border-color:var(--ac);color:#fff;}
.btn.primary:hover{background:#5b53e0;}
.btn.gold{background:rgba(245,200,66,.12);border-color:rgba(245,200,66,.3);color:var(--gold);}
.btn.gold:hover{background:rgba(245,200,66,.2);}
.btn.d{color:var(--red);}
.btn.d:hover{background:rgba(248,113,113,.1);}

/* SECTION */
.sec{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--b2);}

/* WEEK GOAL */
.wg-wrap{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;}
.wg-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;}
.wg-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--b2);color:var(--t1);font-family:'Lora',serif;font-style:italic;font-size:15px;outline:none;padding:2px 0 8px;transition:border-color .15s;}
.wg-inp:focus{border-bottom-color:rgba(108,99,255,.5);}
.wg-inp::placeholder{color:var(--t3);}

/* CAT GRID */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;}
@media(max-width:600px){.cgrid{grid-template-columns:1fr;}}
.cfull{grid-column:span 2;}
@media(max-width:600px){.cfull{grid-column:span 1;}}

/* CATEGORY CARD */
.cc{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;transition:border-color .15s;}
.cc:hover{border-color:var(--b3);}
.cc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--b1);user-select:none;gap:8px;}
.cc-hl{display:flex;align-items:center;gap:8px;}
.cc-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.cc-name{font-size:12px;font-weight:700;}
.cc-pct{font-size:11px;font-weight:600;padding:2px 7px;border-radius:12px;background:rgba(255,255,255,.05);color:var(--t3);}
.cc-chev{font-size:11px;color:var(--t3);transition:transform .2s;flex-shrink:0;}
.cc-chev.o{transform:rotate(180deg);}
.goal-wrap{padding:9px 16px 0;border-bottom:1px solid var(--b1);}
.goal-lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
.goal-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--b2);color:var(--t1);font-family:'Lora',serif;font-size:12px;font-style:italic;outline:none;padding:2px 0 7px;transition:border-color .15s;}
.goal-inp:focus{border-bottom-color:rgba(108,99,255,.5);}
.goal-inp::placeholder{color:var(--t3);}

/* TACTIC ROW */
.trow{border-bottom:1px solid var(--b1);}
.trow:last-child{border-bottom:none;}
.trow-main{display:flex;align-items:center;padding:7px 10px 7px 16px;gap:6px;transition:background .1s;}
.trow-main:hover{background:rgba(255,255,255,.02);}
.tinp{flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;min-width:0;padding:0;}
.tinp::placeholder{color:var(--s3);}
.tinp.sx{color:var(--t3);text-decoration:line-through;}
.tinp.di{color:var(--deleg);}
.tinp.ds{color:var(--setup);opacity:.8;}

/* START DATE BADGE */
.date-badge{flex-shrink:0;font-size:10px;color:var(--t3);background:var(--s2);border:1px solid var(--b2);border-radius:5px;padding:2px 7px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.date-badge:hover{border-color:var(--gold);color:var(--gold);}
.date-badge.set{color:var(--gold);border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.06);}
.date-input-hidden{position:absolute;opacity:0;pointer-events:none;width:0;height:0;}

/* STATUS BTN — 4 states */
.stbtn{flex-shrink:0;width:86px;padding:4px 0;border-radius:6px;border:1px solid;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:600;text-align:center;transition:all .15s;}
.stbtn.todo{background:transparent;color:var(--t3);border-color:var(--b2);}
.stbtn.todo:hover{color:var(--hc);border-color:rgba(45,212,160,.3);}
.stbtn.done{background:rgba(45,212,160,.1);color:var(--hc);border-color:rgba(45,212,160,.28);}
.stbtn.delegate{background:rgba(129,140,248,.1);color:var(--setup);border-color:rgba(129,140,248,.28);}
.stbtn.delegated{background:rgba(196,181,253,.12);color:var(--deleg);border-color:rgba(196,181,253,.3);}
.copy-btn{flex-shrink:0;background:none;border:1px solid var(--b1);color:var(--t3);cursor:pointer;font-size:10px;padding:2px 6px;border-radius:4px;transition:all .15s;white-space:nowrap;}
.copy-btn:hover{color:var(--ac2);border-color:var(--ac);}
.dbtn{flex-shrink:0;background:none;border:none;color:var(--b3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;transition:color .15s;}
.dbtn:hover{color:var(--red);}

/* DELEGATE SETUP PANEL */
.dp{padding:10px 16px 12px;background:rgba(129,140,248,.05);border-top:1px solid rgba(129,140,248,.15);}
.dp-lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--setup);margin-bottom:8px;}
.dp-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.dp-sel,.dp-date{flex:1;min-width:120px;background:var(--s2);border:1px solid rgba(129,140,248,.2);border-radius:6px;color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;padding:6px 10px;outline:none;}
.dp-sel:focus,.dp-date:focus{border-color:var(--setup);}
.dp-ctx{width:100%;background:var(--s2);border:1px solid rgba(129,140,248,.2);border-radius:6px;color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;padding:7px 10px;outline:none;resize:none;min-height:40px;line-height:1.5;}
.dp-ctx:focus{border-color:var(--setup);}
.dp-ctx::placeholder{color:var(--t3);}
.dp-acts{display:flex;gap:8px;margin-top:8px;}
.dp-confirm{background:rgba(196,181,253,.15);border:1px solid rgba(196,181,253,.3);color:var(--deleg);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;padding:6px 16px;border-radius:6px;cursor:pointer;transition:all .15s;}
.dp-confirm:hover{background:rgba(196,181,253,.25);}
.dp-cancel{background:transparent;border:1px solid var(--b2);color:var(--t3);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;}
.dp-cancel:hover{color:var(--t1);}
.deleg-badge{padding:3px 16px 7px;font-size:10px;color:var(--deleg);}

/* NOTES */
.notes-wrap{padding:0 16px 12px;border-top:1px solid var(--b1);}
.notes-lbl{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin:10px 0 5px;}
.notes-ta{width:100%;background:rgba(0,0,0,.15);border:1px solid var(--b1);border-radius:var(--rs);color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;padding:8px 12px;outline:none;resize:none;min-height:50px;transition:border-color .15s;line-height:1.5;}
.notes-ta:focus{border-color:rgba(108,99,255,.4);}
.addbtn{display:flex;align-items:center;gap:5px;padding:8px 16px;background:none;border:none;border-top:1px dashed var(--b2);color:var(--t3);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;width:100%;text-align:left;transition:color .15s;}
.addbtn:hover{color:var(--t2);}

/* DELEGATIONS SECTION */
.dsec{background:var(--s1);border:1px solid rgba(196,181,253,.2);border-radius:var(--r);overflow:hidden;margin-bottom:32px;}
.dsec-head{padding:14px 18px;background:linear-gradient(135deg,rgba(196,181,253,.08),rgba(108,99,255,.05));border-bottom:1px solid rgba(196,181,253,.15);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.dsec-title{font-size:13px;font-weight:700;color:var(--deleg);}
.dsec-sub{font-size:11px;color:var(--t3);margin-top:1px;}
.dstats{display:flex;gap:16px;}
.dstat{text-align:center;}
.dstat-n{font-size:18px;font-weight:700;line-height:1;}
.dstat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;}
.dtable{width:100%;border-collapse:collapse;}
.dtable th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-weight:600;padding:10px 16px;border-bottom:1px solid var(--b2);text-align:left;background:rgba(0,0,0,.1);}
.dtable td{padding:10px 16px;border-bottom:1px solid var(--b1);font-size:12px;color:var(--t2);vertical-align:middle;}
.dtable tr:last-child td{border-bottom:none;}
.dtable tr:hover td{background:rgba(255,255,255,.02);}
.cat-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.ds-pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;}
.ds-pill.pending{background:rgba(196,181,253,.12);color:var(--deleg);border:1px solid rgba(196,181,253,.25);}
.ds-pill.done{background:rgba(45,212,160,.1);color:var(--hc);border:1px solid rgba(45,212,160,.25);}
.ds-pill.overdue{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.25);}
.dempty{padding:28px 18px;text-align:center;color:var(--t3);font-size:13px;}

/* WEEK REVIEW MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,13,26,.85);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-bg.hide{display:none;}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);width:100%;max-width:600px;max-height:85vh;overflow-y:auto;}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;line-height:1;}
.modal-body{padding:20px 24px;}
.review-score{text-align:center;margin-bottom:24px;}
.review-pct{font-size:56px;font-weight:700;letter-spacing:-2px;line-height:1;}
.review-label{font-size:13px;color:var(--t3);margin-top:4px;}
.review-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.review-stat{background:var(--s2);border-radius:var(--rs);padding:12px 16px;}
.review-stat-n{font-size:22px;font-weight:700;line-height:1;}
.review-stat-l{font-size:11px;color:var(--t3);margin-top:3px;}
.review-section{margin-bottom:16px;}
.review-section-title{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.review-item{font-size:12px;padding:6px 0;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px;}
.review-item:last-child{border-bottom:none;}
.modal-foot{padding:16px 24px;border-top:1px solid var(--b2);display:flex;gap:10px;justify-content:flex-end;}

/* LOADER / TOAST */
.loader{position:fixed;inset:0;background:rgba(26,31,46,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.loader.hide{display:none;}
.spinner{width:36px;height:36px;border:3px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-txt{font-size:13px;color:var(--t2);}
.toast{position:fixed;bottom:20px;right:20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;padding:8px 16px;border-radius:10px;opacity:0;transition:opacity .25s;z-index:998;pointer-events:none;max-width:300px;}
.toast.s{background:var(--s2);border:1px solid rgba(45,212,160,.35);color:var(--hc);}
.toast.e{background:var(--s2);border:1px solid rgba(248,113,113,.35);color:var(--red);}
.toast.d{background:var(--s2);border:1px solid rgba(196,181,253,.35);color:var(--deleg);}
.toast.g{background:var(--s2);border:1px solid rgba(245,200,66,.35);color:var(--gold);}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-txt">Loading your 12WY data…</div>
</div>

<!-- Week Review Modal -->
<div class="modal-bg hide" id="reviewModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="reviewTitle">Week Review</div>
      <button class="modal-close" onclick="closeReview()">×</button>
    </div>
    <div class="modal-body" id="reviewBody"></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeReview()">Close</button>
      <button class="btn gold" onclick="confirmRollover()">↗ Roll Over Incomplete to Next Week</button>
    </div>
  </div>
</div>

<div class="wrap">
  <header class="hdr">
    <div>
      <div class="eyebrow">MySoul Ecosystem</div>
      <div class="title">12 Week <em>Year</em></div>
    </div>
    <div class="hdr-right">
      <div class="sbadge off" id="sbadge">⟳ Connecting</div>
      <div class="wpill" id="wpill">Week 8 of 12</div>
    </div>
  </header>

  <div class="tl-wrap">
    <div class="tl-lbl">12-Week Progress</div>
    <div class="tl-bar" id="tlBar"></div>
    <div class="tl-nums" id="tlNums"></div>
  </div>

  <div class="wnav">
    <span class="wnav-lbl">Week</span>
    <div class="wtabs" id="wtabs"></div>
    <button class="cur-btn" onclick="setCur()">Set as Current</button>
  </div>

  <div class="ss">
    <div class="sc p">
      <div class="sc-lbl">Weekly Score</div>
      <div class="sc-val" id="sval" style="color:var(--ac2)">0%</div>
      <div class="sc-sub" id="ssub">0 of 0 done</div>
      <div class="pbar"><div class="pfill" id="sbar" style="width:0%;background:var(--ac)"></div></div>
    </div>
    <div class="sc">
      <div class="sc-lbl">12WY Avg</div>
      <div class="sc-val" id="avgv" style="color:var(--hc)">0%</div>
      <div class="sc-sub">all weeks</div>
    </div>
    <div class="sc">
      <div class="sc-lbl">Best Week</div>
      <div class="sc-val" id="bestv" style="color:var(--gold)">—</div>
      <div class="sc-sub" id="bests">highest score</div>
    </div>
  </div>

  <div class="bd" id="bd"></div>

  <div class="actions">
    <button class="btn primary" onclick="manualSync()">↑ Push to Sheet</button>
    <button class="btn" onclick="manualLoad()">↓ Pull from Sheet</button>
    <button class="btn gold" onclick="openWeekReview()">📊 Week Review & Rollover</button>
    <button class="btn d" onclick="clrWeek()">Clear Week</button>
  </div>

  <div class="sec">Week Goal</div>
  <div class="wg-wrap">
    <div class="wg-lbl">What does winning this week look like?</div>
    <input class="wg-inp" id="wgInp" type="text" placeholder="e.g. Hit 150 leads/day, 4 closings, walk every day…" onchange="updateWG(this.value)">
  </div>

  <div class="sec">Tactics</div>
  <div class="cgrid" id="cgrid"></div>

  <div class="sec">Delegations This Week</div>
  <div class="dsec" id="dsec"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API    = 'https://script.google.com/macros/s/AKfycbwAnRCgx7A9ucRSx4OH39Eufhq1_Doami_wGqFgmQvu5vNhI6q1q5ldXWgkNKH2k_pz/exec';
const LS_KEY = 'ms12wy_v7';

const WEEK_DATES = {1:'16–22 Mar',2:'23–29 Mar',3:'30 Mar–5 Apr',4:'6–12 Apr',5:'13–19 Apr',6:'20–26 Apr',7:'27 Apr–3 May',8:'4–10 May',9:'11–17 May',10:'18–24 May',11:'25–31 May',12:'1–7 Jun'};
const TEAM = ['Namita Singh','Dolly Nagar','Varsha Rajput','Tanvi Negi','Deesha Jain','Aravind Kumaravel','Siddhi Singh','Vandna Narwat','Rudrani Saha','Megha Chanda'];
const CATS = [
  {id:'health',  name:'Health & Family', color:'#2dd4a0', bg:'rgba(45,212,160,.12)',  ico:'🏃', ph:'Walk, gym & family Sunday',    full:false},
  {id:'space',   name:'MySoulSpace',     color:'#ff8c5a', bg:'rgba(255,140,90,.12)',  ico:'🧘', ph:'Closings & team systems',       full:false},
  {id:'school',  name:'MySoulSchool',    color:'#5ab4ff', bg:'rgba(90,180,255,.12)',  ico:'📚', ph:'Scale leads, launch funnels',   full:false},
  {id:'store',   name:'MySoulStore',     color:'#e879b0', bg:'rgba(232,121,176,.12)', ico:'🛍️', ph:'Source & launch first product', full:false},
  {id:'personal',name:'Personal Growth', color:'#b97dff', bg:'rgba(185,125,255,.12)', ico:'🎯', ph:'Strategic blocks & journaling', full:true},
];

let S = {cur:8,view:8,weeks:{},col:{}};
let pushTimer=null, reviewData=null;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,5);
function newT(){return{id:uid(),text:'',status:'todo',startDate:'',delegatedTo:'',dueDate:'',delegationContext:''};}
function defWeek(){const w={goal:'',cats:{}};CATS.forEach(c=>{w.cats[c.id]={goal:'',notes:'',tactics:[newT()]};});return w;}
function getW(n){if(!S.weeks[n])S.weeks[n]=defWeek();return S.weeks[n];}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function lsSave(){try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){}}
function lsLoad(){try{const d=localStorage.getItem(LS_KEY);if(d)S=JSON.parse(d);}catch(e){}}
function badge(st,txt){const el=document.getElementById('sbadge');el.className='sbadge '+st;el.textContent=txt;}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
function pushToSheet(extra){
  lsSave();badge('busy','⟳ Saving…');
  const payload=extra?{...S,...extra}:S;
  fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
  .then(()=>badge('ok','✓ Saved')).catch(()=>badge('err','⚡ Offline'));
}
async function pullFromSheet(){
  badge('busy','⟳ Loading…');
  try{
    const res=await fetch(API+'?t='+Date.now(),{mode:'cors'});
    const txt=await res.text();
    if(txt&&txt.includes('"weeks"')){S=JSON.parse(txt);lsSave();badge('ok','✓ Synced');return true;}
    badge('ok','✓ Ready');return false;
  }catch(e){badge('err','⚡ Offline');return false;}
}
function schedulePush(){lsSave();clearTimeout(pushTimer);pushTimer=setTimeout(()=>pushToSheet(),2000);}
function manualSync(){pushToSheet();showToast('Pushed to Google Sheet ✓','s');}
async function manualLoad(){
  document.getElementById('loader').classList.remove('hide');
  const ok=await pullFromSheet();if(ok)render();
  document.getElementById('loader').classList.add('hide');
  showToast(ok?'Loaded ✓':'Using local data','s');
}

// ─── SCORING ──────────────────────────────────────────────────────────────────
function scoreW(n){
  const w=S.weeks[n];if(!w)return{done:0,total:0,pct:0,bc:{}};
  let done=0,total=0;const bc={};
  CATS.forEach(c=>{
    const cd=w.cats[c.id];if(!cd){bc[c.id]={done:0,total:0,pct:0};return;}
    const ts=cd.tactics.filter(t=>t.text&&t.text.trim());
    const d=ts.filter(t=>t.status==='done').length;
    const dl=ts.filter(t=>t.status==='delegated').length;
    bc[c.id]={done:d,delegated:dl,total:ts.length,pct:ts.length?Math.round((d+dl)/ts.length*100):0};
    done+=d+dl;total+=ts.length;
  });
  return{done,total,pct:total?Math.round(done/total*100):0,bc};
}
function allS(){return Array.from({length:12},(_,i)=>scoreW(i+1));}

function getDelegs(n){
  const w=S.weeks[n];if(!w)return[];const result=[];
  CATS.forEach(c=>{
    const cd=w.cats[c.id];if(!cd)return;
    cd.tactics.forEach(t=>{
      if((t.status==='delegated'||t.status==='delegate')&&t.text&&t.text.trim())
        result.push({...t,catId:c.id,catName:c.name,catColor:c.color});
    });
  });
  return result;
}

// ─── WEEK REVIEW ──────────────────────────────────────────────────────────────
function openWeekReview(){
  const w=S.view, sc=scoreW(w), weekData=getW(w);
  const wins=[], rolledOver=[], rolledOverTasks=[];
  const catScores={};

  CATS.forEach(c=>{
    const cd=weekData.cats[c.id]; if(!cd)return;
    const ts=cd.tactics.filter(t=>t.text&&t.text.trim());
    const done=ts.filter(t=>t.status==='done');
    const incomplete=ts.filter(t=>t.status==='todo'||t.status==='delegate');
    const cs=sc.bc[c.id]||{pct:0};
    catScores[c.id]=cs.pct;
    done.forEach(t=>wins.push({cat:c.name,color:c.color,text:t.text}));
    incomplete.forEach(t=>rolledOver.push({cat:c.name,color:c.color,text:t.text,catId:c.id,id:t.id}));
    rolledOverTasks.push(...incomplete.map(t=>t.text));
  });

  reviewData={week:w,overallPct:sc.pct,total:sc.total,done:sc.done,delegated:0,rolledOver:rolledOver.length,wins:wins.map(w=>w.cat+': '+w.text),rolledOverTasks,catScores,rolledOverItems:rolledOver};

  const pctColor=sc.pct>=85?'var(--hc)':sc.pct>=70?'var(--gold)':'var(--red)';

  document.getElementById('reviewTitle').textContent=`Week ${w} Review — ${WEEK_DATES[w]||''}`;
  document.getElementById('reviewBody').innerHTML=`
    <div class="review-score">
      <div class="review-pct" style="color:${pctColor}">${sc.pct}%</div>
      <div class="review-label">${sc.pct>=85?'🔥 Excellent week!':sc.pct>=70?'✅ Good week — room to push':sc.pct>=50?'⚠️ Average — what got in the way?':'🔴 Tough week — be honest with yourself'}</div>
    </div>
    <div class="review-grid">
      <div class="review-stat"><div class="review-stat-n" style="color:var(--hc)">${sc.done}</div><div class="review-stat-l">Completed</div></div>
      <div class="review-stat"><div class="review-stat-n" style="color:var(--gold)">${rolledOver.length}</div><div class="review-stat-l">To Roll Over</div></div>
      <div class="review-stat"><div class="review-stat-n" style="color:var(--deleg)">${getDelegs(w).filter(d=>d.status==='delegated').length}</div><div class="review-stat-l">Delegated</div></div>
      <div class="review-stat"><div class="review-stat-n" style="color:var(--t2)">${sc.total}</div><div class="review-stat-l">Total Tactics</div></div>
    </div>
    ${wins.length?`<div class="review-section"><div class="review-section-title">✅ Completed This Week</div>${wins.map(w=>`<div class="review-item"><span style="width:8px;height:8px;border-radius:50%;background:${w.color};flex-shrink:0;display:inline-block"></span><span style="color:var(--t3);font-size:11px">${w.cat}</span><span>${w.text}</span></div>`).join('')}</div>`:''}
    ${rolledOver.length?`<div class="review-section"><div class="review-section-title">↗ Will Roll Over to Week ${Math.min(w+1,12)}</div>${rolledOver.map(r=>`<div class="review-item"><span style="width:8px;height:8px;border-radius:50%;background:${r.color};flex-shrink:0;display:inline-block"></span><span style="color:var(--t3);font-size:11px">${r.cat}</span><span>${r.text}</span></div>`).join('')}</div>`:'<div style="text-align:center;color:var(--hc);padding:16px;font-size:13px">🎉 All tactics completed — nothing to roll over!</div>'}
    <div style="background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.2);border-radius:var(--rs);padding:12px 16px;font-size:12px;color:var(--gold)">
      ↗ Clicking "Roll Over" will copy ${rolledOver.length} incomplete tactic${rolledOver.length!==1?'s':''} to Week ${Math.min(w+1,12)} with dates reset. This week's data stays intact.
    </div>`;
  document.getElementById('reviewModal').classList.remove('hide');
}

function closeReview(){document.getElementById('reviewModal').classList.add('hide');reviewData=null;}

function confirmRollover(){
  if(!reviewData)return;
  const nextW=Math.min(reviewData.week+1,12);
  const nextWeek=getW(nextW);

  reviewData.rolledOverItems.forEach(item=>{
    CATS.forEach(c=>{
      if(c.id!==item.catId)return;
      // Check not already in next week
      const exists=nextWeek.cats[c.id].tactics.some(t=>t.text===item.text);
      if(!exists){
        nextWeek.cats[c.id].tactics.push({
          id:uid(),text:item.text,status:'todo',
          startDate:'',delegatedTo:'',dueDate:'',delegationContext:''
        });
      }
    });
  });

  // Save with week review data
  pushToSheet({weekReview:reviewData});
  closeReview();
  showToast(`${reviewData.rolledOverItems.length} tactics rolled over to Week ${nextW} ✓`,'g');
  // Switch to next week view
  S.view=nextW;render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){rTl();rTabs();rScores();rBd();rWG();rGrid();rDeleg();}

function rTl(){
  const sc=allS();
  document.getElementById('tlBar').innerHTML=Array.from({length:12},(_,i)=>{
    const w=i+1,s=sc[i];let cls='ts';
    if(w===S.view)cls+=' viewing';
    if(w===S.cur)cls+=' current';
    else if(w<S.cur&&s.total>0)cls+=s.pct>=75?' great':' past';
    else if(w<S.cur)cls+=' past';
    return `<div class="${cls}" onclick="selW(${w})" title="W${w} (${WEEK_DATES[w]}): ${s.pct}%"></div>`;
  }).join('');
  document.getElementById('tlNums').innerHTML=Array.from({length:12},(_,i)=>`<span>${i+1}</span>`).join('');
}

function rTabs(){
  const sc=allS();
  document.getElementById('wtabs').innerHTML=Array.from({length:12},(_,i)=>{
    const w=i+1,s=sc[i];
    return `<button class="wt${w===S.view?' active':''}${s.total>0?' dot':''}" onclick="selW(${w})" title="${WEEK_DATES[w]}">${w}</button>`;
  }).join('');
  document.getElementById('wpill').textContent=`Week ${S.cur} of 12`;
}

function rScores(){
  const s=scoreW(S.view);const p=s.pct;
  const el=document.getElementById('sval');
  el.textContent=p+'%';el.style.color=p>=85?'var(--hc)':p>=70?'var(--gold)':'var(--ac2)';
  document.getElementById('ssub').textContent=`${s.done} of ${s.total} done`;
  const b=document.getElementById('sbar');
  b.style.width=p+'%';b.style.background=p>=85?'var(--hc)':p>=70?'var(--gold)':'var(--ac)';
  const all=allS().filter(x=>x.total>0);
  const avg=all.length?Math.round(all.reduce((a,b)=>a+b.pct,0)/all.length):0;
  document.getElementById('avgv').textContent=avg+'%';
  let best={pct:0,w:0};
  allS().forEach((x,i)=>{if(x.pct>best.pct&&x.total>0){best.pct=x.pct;best.w=i+1;}});
  document.getElementById('bestv').textContent=best.w?best.pct+'%':'—';
  document.getElementById('bests').textContent=best.w?`Week ${best.w}`:'no data yet';
}

function rBd(){
  const s=scoreW(S.view);
  document.getElementById('bd').innerHTML=CATS.map(c=>{
    const cs=s.bc[c.id]||{done:0,total:0,pct:0};
    return `<div><div class="bd-lbl"><span class="bd-dot" style="background:${c.color}"></span>${c.name}</div>
    <div class="bd-track"><div class="bd-bar" style="width:${cs.pct}%;background:${c.color}"></div></div>
    <div class="bd-pct">${cs.done}/${cs.total} · ${cs.pct}%</div></div>`;
  }).join('');
}

function rWG(){document.getElementById('wgInp').value=getW(S.view).goal||'';}

function rGrid(){
  const w=getW(S.view);
  document.getElementById('cgrid').innerHTML=CATS.map(c=>{
    const cd=w.cats[c.id]||{goal:'',notes:'',tactics:[]};
    const open=!S.col[c.id];
    const s=(scoreW(S.view).bc[c.id])||{pct:0};
    const pc=s.pct>=85?'var(--hc)':s.pct>=70?'var(--gold)':'var(--t3)';

    const rows=cd.tactics.map(t=>{
      const isDone=t.status==='done', isDel=t.status==='delegated', isSetup=t.status==='delegate';
      const stMap={todo:{cls:'todo',lbl:'○ To do'},done:{cls:'done',lbl:'✓ Done'},delegate:{cls:'delegate',lbl:'⟳ Delegate'},delegated:{cls:'delegated',lbl:'→ Delegated'}};
      const st=stMap[t.status]||stMap.todo;
      const inpCls=isDone?'sx':isDel?'di':isSetup?'ds':'';
      const dateSet=t.startDate?true:false;
      const dateLbl=t.startDate?fmtDate(t.startDate):'+ Date';

      const setupPanel=isSetup?`
        <div class="dp">
          <div class="dp-lbl">Set up delegation</div>
          <div class="dp-row">
            <select class="dp-sel" onchange="upDTo('${c.id}','${t.id}',this.value)">
              <option value="">Assign to…</option>
              ${TEAM.map(m=>`<option value="${m}"${t.delegatedTo===m?' selected':''}>${m}</option>`).join('')}
            </select>
            <input class="dp-date" type="date" value="${t.dueDate||''}" placeholder="Due date" onchange="upDDate('${c.id}','${t.id}',this.value)">
          </div>
          <textarea class="dp-ctx" placeholder="Context / instructions (optional)…" onchange="upDCtx('${c.id}','${t.id}',this.value)">${esc(t.delegationContext||'')}</textarea>
          <div class="dp-acts">
            <button class="dp-confirm" onclick="confirmDel('${c.id}','${t.id}')">✓ Confirm &amp; Notify via Slack</button>
            <button class="dp-cancel" onclick="cancelDel('${c.id}','${t.id}')">Cancel</button>
          </div>
        </div>`:''

      const delBadge=isDel?`<div class="deleg-badge">→ ${t.delegatedTo||'Unassigned'}${t.dueDate?' · Due '+t.dueDate:''}</div>`:''

      return `<div class="trow">
        <div class="trow-main">
          <input class="tinp ${inpCls}" type="text" value="${esc(t.text)}" placeholder="Add tactic…"
            onchange="upT('${c.id}','${t.id}',this.value)" oninput="ltT('${c.id}','${t.id}',this.value)">
          <span class="date-badge${dateSet?' set':''}" onclick="pickDate('${c.id}','${t.id}')" title="Set start date">${dateLbl}</span>
          <input type="date" id="dp_${t.id}" class="date-input-hidden" value="${t.startDate||''}" onchange="upStart('${c.id}','${t.id}',this.value)">
          <button class="stbtn ${st.cls}" onclick="cycleStatus('${c.id}','${t.id}')">${st.lbl}</button>
          <button class="copy-btn" onclick="copyToNext('${c.id}','${t.id}')" title="Copy to next week">↗</button>
          <button class="dbtn" onclick="delT('${c.id}','${t.id}')">×</button>
        </div>
        ${setupPanel}${delBadge}
      </div>`;
    }).join('');

    return `<div class="cc${c.full?' cfull':''}">
      <div class="cc-head" onclick="togCat('${c.id}')">
        <div class="cc-hl">
          <div class="cc-ico" style="background:${c.bg}">${c.ico}</div>
          <span class="cc-name" style="color:${c.color}">${c.name}</span>
          <span class="cc-pct" style="color:${pc}">${s.pct}%</span>
        </div>
        <span class="cc-chev${open?' o':''}">▾</span>
      </div>
      ${open?`
        <div class="goal-wrap">
          <div class="goal-lbl">Weekly focus</div>
          <input class="goal-inp" type="text" value="${esc(cd.goal||'')}" placeholder="${c.ph}…" onchange="upGoal('${c.id}',this.value)">
        </div>
        <div>${rows}</div>
        <button class="addbtn" onclick="addT('${c.id}')">＋ Add tactic</button>
        <div class="notes-wrap">
          <div class="notes-lbl">Notes / blockers</div>
          <textarea class="notes-ta" placeholder="Wins, blockers, learnings…" onchange="upNotes('${c.id}',this.value)">${esc(cd.notes||'')}</textarea>
        </div>
      `:''}
    </div>`;
  }).join('');
}

function rDeleg(){
  const delegs=getDelegs(S.view), el=document.getElementById('dsec');
  const total=delegs.length;
  const confirmed=delegs.filter(d=>d.status==='delegated').length;
  const setup=delegs.filter(d=>d.status==='delegate').length;
  const today=new Date();

  const stats=`<div class="dstats">
    <div class="dstat"><div class="dstat-n" style="color:var(--deleg)">${total}</div><div class="dstat-l">Total</div></div>
    <div class="dstat"><div class="dstat-n" style="color:var(--setup)">${setup}</div><div class="dstat-l">Setting Up</div></div>
    <div class="dstat"><div class="dstat-n" style="color:var(--hc)">${confirmed}</div><div class="dstat-l">Notified</div></div>
  </div>`;

  if(!total){
    el.innerHTML=`<div class="dsec-head"><div><div class="dsec-title">→ Delegations — Week ${S.view}</div><div class="dsec-sub">No delegations this week</div></div>${stats}</div>
    <div class="dempty">No delegated tasks yet.<br><small>Cycle a tactic status to "⟳ Delegate" to get started.</small></div>`;
    return;
  }

  const rows=delegs.map(d=>{
    const isOverdue=d.dueDate&&new Date(d.dueDate)<today&&d.status==='delegated';
    const dsCls=isOverdue?'overdue':'pending';
    const dsLbl=isOverdue?'🔴 Overdue':d.status==='delegate'?'⟳ Setting Up':'→ Active';
    return `<tr>
      <td><span class="cat-pill" style="background:${d.catColor}20;color:${d.catColor}">${d.catName}</span></td>
      <td style="color:var(--t1)">${esc(d.text)}</td>
      <td>${d.delegatedTo||'<span style="color:var(--t3)">Unassigned</span>'}</td>
      <td>${d.startDate?`<span style="color:var(--gold)">${fmtDate(d.startDate)}</span>`:'<span style="color:var(--t3)">—</span>'}</td>
      <td>${d.dueDate||'<span style="color:var(--t3)">—</span>'}</td>
      <td><button class="ds-pill ${dsCls}" onclick="markDelegDone('${d.catId}','${d.id}')">${dsLbl}</button></td>
    </tr>`;
  }).join('');

  el.innerHTML=`<div class="dsec-head"><div><div class="dsec-title">→ Delegations — Week ${S.view}</div><div class="dsec-sub">Strategic 12WY tasks delegated to your team</div></div>${stats}</div>
  <table class="dtable">
    <thead><tr><th>Category</th><th>Task</th><th>Assigned To</th><th>Start Date</th><th>Due Date</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function selW(w){S.view=w;render();}
function setCur(){S.cur=S.view;schedulePush();render();showToast(`Week ${S.view} set as current`,'s');}
function togCat(id){S.col[id]=!S.col[id];render();}
function updateWG(val){getW(S.view).goal=val;schedulePush();}

function pickDate(cid,tid){
  const el=document.getElementById('dp_'+tid);
  if(el){el.style.pointerEvents='auto';el.style.opacity='1';el.click();setTimeout(()=>{el.style.pointerEvents='none';el.style.opacity='0';},300);}
}
function upStart(cid,tid,val){
  const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);
  if(t){t.startDate=val;schedulePush();rGrid();rDeleg();showToast('Start date set ✓','s');}
}

function cycleStatus(cid,tid){
  const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);
  if(!t)return;
  const cycle={todo:'done',done:'delegate',delegate:'todo',delegated:'todo'};
  t.status=cycle[t.status]||'todo';
  schedulePush();render();
  if(t.status==='delegate')showToast('Fill in assignee & due date, then confirm to send via MySoul Bot','d');
}
function confirmDel(cid,tid){
  const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);
  if(!t)return;
  if(!t.delegatedTo){showToast('Please assign to a team member first','e');return;}
  t.status='delegated';schedulePush();render();
  showToast(`Delegated to ${t.delegatedTo} — MySoul Bot will notify in #mission-critical-tasks 🚀`,'d');
}
function cancelDel(cid,tid){
  const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);
  if(t){t.status='todo';schedulePush();render();}
}
function markDelegDone(cid,tid){
  const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);
  if(t&&t.status==='delegated'){t.status='done';schedulePush();render();showToast('Marked done ✓','s');}
}

function copyToNext(cid,tid){
  const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);
  if(!t||!t.text.trim()){showToast('Add tactic text first','e');return;}
  const nextW=Math.min(S.view+1,12);
  const nextWeek=getW(nextW);
  const exists=nextWeek.cats[cid].tactics.some(x=>x.text===t.text);
  if(exists){showToast(`Already in Week ${nextW}`,'e');return;}
  nextWeek.cats[cid].tactics.push({...newT(),text:t.text});
  schedulePush();showToast(`Copied to Week ${nextW} ✓`,'g');
}

function upT(cid,tid,val){
  const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);
  if(t){t.text=val;schedulePush();rScores();rBd();rTl();rTabs();}
}
function ltT(cid,tid,val){const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);if(t)t.text=val;}
function upDTo(cid,tid,val){const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);if(t){t.delegatedTo=val;lsSave();rDeleg();}}
function upDDate(cid,tid,val){const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);if(t){t.dueDate=val;lsSave();rDeleg();}}
function upDCtx(cid,tid,val){const t=getW(S.view).cats[cid].tactics.find(x=>x.id===tid);if(t){t.delegationContext=val;lsSave();}}
function upGoal(cid,val){getW(S.view).cats[cid].goal=val;schedulePush();}
function upNotes(cid,val){getW(S.view).cats[cid].notes=val;schedulePush();}
function addT(cid){
  getW(S.view).cats[cid].tactics.push(newT());schedulePush();render();
  setTimeout(()=>{const r=document.querySelectorAll('.tinp');r[r.length-1]?.focus();},50);
}
function delT(cid,tid){
  const cat=getW(S.view).cats[cid];
  if(cat.tactics.length<=1){cat.tactics[0]=newT();schedulePush();render();return;}
  cat.tactics=cat.tactics.filter(x=>x.id!==tid);schedulePush();render();
}
function clrWeek(){
  if(!confirm(`Clear all data for Week ${S.view}?`))return;
  delete S.weeks[S.view];schedulePush();render();showToast('Week cleared','e');
}

function fmtDate(d){
  if(!d)return'';
  try{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short'});}
  catch(e){return d;}
}
function showToast(msg,type='s'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function init(){lsLoad();render();const ok=await pullFromSheet();if(ok)render();document.getElementById('loader').classList.add('hide');}
init();
</script>
</body>
</html>
