name: Deploy Command Centre to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'command-centre/**'
      - '.github/workflows/deploy-command-centre.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install
        working-directory: ./command-centre
        run: npm install

      - name: Build
        working-directory: ./command-centre
        run: npm run build

      - name: Deploy built files to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./command-centre/dist
          destination_dir: command-centre
          keep_files: true
          exclude_assets: ''
