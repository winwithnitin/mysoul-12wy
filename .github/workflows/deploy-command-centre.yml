name: Deploy Command Centre to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'command-centre/**'
      - '.github/workflows/deploy-command-centre.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install
        working-directory: ./command-centre
        run: npm install

      - name: Build
        working-directory: ./command-centre
        run: npm run build

      - name: Checkout gh-pages branch
        run: |
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

      - name: Copy build to command-centre folder
        run: |
          mkdir -p command-centre
          cp -r ./command-centre/dist/. ./command-centre/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add command-centre/
          git diff --staged --quiet || git commit -m "Deploy Command Centre [skip ci]"
          git push origin gh-pages
