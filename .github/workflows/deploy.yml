name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Copy root pages to docs
        run: |
          mkdir -p docs
          cp index.html docs/ 2>/dev/null || true
          cp reiki-optin-page-v2.html docs/ 2>/dev/null || true
          cp reiki-optin-page.html docs/ 2>/dev/null || true

      - name: Commit docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Build: update docs/ [skip ci]"
          git push
